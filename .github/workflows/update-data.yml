name: Update Store Data

on:
  schedule:
    # Every day at 02:30 UTC
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild data
        run: |
          python scripts/build_data.py --refresh-source --api-timeout 30 --min-official-rows 120

      - name: Commit changes if any
        run: |
          if git diff --quiet; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "lyhellcat"
          git config user.email "hellcat@88.com"
          git add data/ sf_store_address.html sf_store_address_en.html
          git commit -m "chore(data): auto update store data"
          git push
